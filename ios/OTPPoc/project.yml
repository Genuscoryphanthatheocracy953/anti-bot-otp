name: OTPPoc
options:
  bundleIdPrefix: com.otppoc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  OTPPoc:
    type: application
    platform: iOS
    sources:
      - OTPPoc
    info:
      path: OTPPoc/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: com.otppoc.OTPPoc
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  OTPPocTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - OTPPocTests
    dependencies:
      - target: OTPPoc
    settings:
      base:
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: com.otppoc.OTPPocTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OTPPoc.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/OTPPoc"
        BUNDLE_LOADER: "$(TEST_HOST)"
